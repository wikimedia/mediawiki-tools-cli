type: mwcli.dev/recipe
version: 0.1
name: electronpdfservice
description: >-
  ElectronPdfService extension setup. Note: rendering requires an external
  RESTBase+Proton service; this recipe configures MediaWiki-side extension setup only.

source:
  shallow: true

services:
  - name: mediawiki
  - name: mysql

code:
  core: true
  skins:
    - name: Vector
  extensions:
    - name: Collection
    - name: ElectronPdfService

sites:
  - dbname: default
    dbtype: mysql

localSettings:
  appendPHP: |
    wfLoadSkin( 'Vector' );
    wfLoadExtension( 'Collection' );
    wfLoadExtension( 'ElectronPdfService' );
    $wgElectronPdfServiceRESTbaseURL = '/api/rest_v1/page/pdf/';

maintenance:
  - name: update-database
    command: ["php", "maintenance/run.php", "update.php"]
