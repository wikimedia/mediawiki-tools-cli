apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    version: 1
  
  - name: Graphite
    type: graphite
    access: proxy
    url: http://graphite:80
    isDefault: false
    editable: true
    version: 1
  
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    isDefault: false
    editable: true
    version: 1
